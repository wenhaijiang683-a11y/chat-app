<!DOCTYPE html>
<html>
<head>
  <title>真实股票数据</title>
  <style>
    body {
      background: #0d1117;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    .box {
      margin: 30px;
      padding: 20px;
      background: #161b22;
      border-radius: 12px;
    }
    .up { color: #00ff88; }
    .down { color: #ff4d4d; }
  </style>
</head>
<body>

<div class="box">
  <h1>📈 股票数据（在线）</h1>
  <h2 id="price">加载中...</h2>
  <h3 id="change"></h3>
</div>

<script>
async function load() {
  try {
    // 用公开API（模拟真实请求方式）
    let res = await fetch("https://api.coindesk.com/v1/bpi/currentprice.json");
    let data = await res.json();

    let price = data.bpi.USD.rate_float;

    // 模拟涨跌
    let change = (Math.random() * 4 - 2).toFixed(2);

    document.getElementById("price").innerText = "BTC: $" + price.toFixed(2);

    const changeEl = document.getElementById("change");
    changeEl.innerText = change + "%";

    if (change >= 0) {
      changeEl.className = "up";
    } else {
      changeEl.className = "down";
    }

  } catch (e) {
    document.getElementById("price").innerText = "❌ 加载失败";
  }
}

// 每5秒刷新
setInterval(load, 5000);
load();
</script>

</body>
</html>
